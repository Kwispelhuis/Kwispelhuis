name: VDM Voorraad Sync
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  voorraad-sync:
    name: Voorraad Sync (elke 15 min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Cache herstellen (vorige voorraadstand)
        uses: actions/cache@v4
        with:
          path: /tmp/vdm_voorraad_cache.json
          key: vdm-voorraad-cache
          restore-keys: vdm-voorraad-cache

      - name: Voorraad sync uitvoeren
        env:
          VDM_FTP_HOST: ${{ secrets.VDM_FTP_HOST }}
          VDM_FTP_USER: ${{ secrets.VDM_FTP_USER }}
          VDM_FTP_PASS: ${{ secrets.VDM_FTP_PASS }}
          SHOPIFY_DOMAIN: ${{ secrets.SHOPIFY_DOMAIN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: python scripts/vdm_voorraad_sync.py

      - name: Cache opslaan (nieuwe voorraadstand)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/vdm_voorraad_cache.json
          key: vdm-voorraad-cache
